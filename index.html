<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idrottsloggen Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button onclick="showSection('log-view')">Logga</button>
        <button onclick="showSection('class-view')">Klasser</button>
        <button onclick="showSection('student-view')">Elevanalys</button>
    </nav>

    <main>
        <section id="log-view">
            <h2>Logga prestation</h2>
            <form id="log-form">
                <select id="l-class" onchange="updateStudentDropdown()" required><option value="">Välj klass...</option></select>
                <select id="l-student" required><option value="">Välj elev...</option></select>
                <select id="l-area" onchange="updateMomentDropdown()" required><option value="">Välj område...</option></select>
                <select id="l-moment" required><option value="">Välj moment...</option></select>
                <select id="l-level" required>
                    <option value="Ej visat">Ej visat</option><option value="På väg">På väg</option>
                    <option value="E">E</option><option value="C">C</option><option value="A">A</option>
                </select>
                <button type="submit">Spara Logg</button>
            </form>
        </section>

        <section id="class-view" style="display:none;">
            <h2>Hantera Klasser & Elever</h2>
            <input type="text" id="new-class" placeholder="Klassnamn (t.ex. 7C)">
            <button onclick="addClass()">Lägg till klass</button>
            <div id="class-editor"></div>
        </section>

        <section id="student-view" style="display:none;">
            <h2>Elevanalys</h2>
            <select id="s-class" onchange="updateSearchStudent()"><option value="">Välj klass...</option></select>
            <select id="s-student" onchange="renderReport()"><option value="">Välj elev...</option></select>
            <div id="report-container"></div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
