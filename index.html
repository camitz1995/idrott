<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Idrottsloggen</title>
</head>
<body>
    <nav>
        <button onclick="showSection('log-view')">Logga</button>
        <button onclick="showSection('class-view')">Klasser</button>
    </nav>

    <section id="log-view">
        <h2>Logga</h2>
        <select id="l-class" onchange="console.log('Class changed')"></select>
    </section>

    <section id="class-view" style="display:none;">
        <h2>Hantera Klasser</h2>
        <input type="text" id="new-class" placeholder="T.ex. 7C">
        <button id="add-class-btn">Lägg till klass</button>
        <div id="class-editor"></div>
    </section>

    <script src="app.js"></script>
</body>
</html>
